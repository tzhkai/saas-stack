name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build
        run: |
          cd apps/tool-markdown
          pnpm install --no-frozen-lockfile
          npx astro build

      - name: Deploy Pages
        run: |
          cd apps/tool-markdown
          npx wrangler pages deploy dist --project-name tool-markdown
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2636b35e232e4eee44c3f7333b6a857d

      - name: Deploy Worker
        run: |
          cd apps/tool-markdown/worker
          npx wrangler deploy --no-bundle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
